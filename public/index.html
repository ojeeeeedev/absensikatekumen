<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Absensi Katekumen</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: #000; color: #fff;
        font-family: "Inter", sans-serif; /* Fixed font matching */
        display: flex; flex-direction: column; align-items: center;
        overflow: hidden;
      }
      h1 { margin: 1rem 0 0.4rem 0; font-size: 1.5rem; text-align: center; }
      h2 { margin: 0; font-size: 1rem; color: #a8a8a8; text-align: center; font-weight: 500; }
      
      label { font-size: 0.95rem; margin-top: 0.6rem; }
      
      select {
        width: 90%; max-width: 400px;
        background: #111; color: #fff;
        font-size: .9rem; text-align: center;
        padding: 0.6rem; border-radius: 8px;
        border: 1px solid #333; margin-top: 0.4rem;
      }

      #reader {
        width: 92vw; max-width: 420px;
        aspect-ratio: 1 / 1;
        margin-top: 1rem; border-radius: 14px;
        overflow: hidden; background: #111;
        position: relative;
      }
      
      /* Loading Placeholder for Camera */
      #reader::before {
        content: "Memuat Kamera...";
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #666; font-size: 0.9rem;
        z-index: 0;
      }

      #status {
        margin-top: 1rem; font-size: 0.85rem;
        font-weight: 400; text-align: center;
        width: 90%; max-width: 420px;
        padding: 0.8rem; border-radius: 8px;
        min-height: 50px; /* Prevent layout jump */
        display: flex; align-items: center; justify-content: center;
        transition: all 0.3s ease;
      }
      
      .idle { background: #111; color: #aaa; border: 1px dashed #333; }
      .success { background: #00c851; color: #fff; border: none; }
      .error { background: #ff4444; color: #fff; border: none; }
      .processing { background: #0099CC; color: #fff; animation: pulse 1s infinite; }

      @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

      .student-id { display: block; margin-top: 4px; font-size: 0.75rem; font-weight: 600; opacity: 0.9; }
      
      footer {
        font-size: 0.65rem; color: #666;
        margin-top: auto; padding-bottom: 1rem;
        line-height: 1.4; text-align: center;
      }
      footer a { color: #72b7ff; text-decoration: none; }
      footer a:hover { color: #a8d4ff; text-decoration: underline; }
    </style>
  </head>

  <body>
    <h1>Presensi Katekumen Dewasa</h1>
    <h2>Gereja Katedral St. Petrus Bandung</h2>

    <label for="week"><b>Pilih Topik:</b></label>
    <select id="week">
      <option disabled selected value="">Memuat daftar topik...</option>
    </select>

    <div id="reader"></div>
    <div id="status" class="idle">📷 Silakan pindai kode QR</div>

    <footer>
      <b>© 2025 Tim TI Katekumen Dewasa - St. Petrus Katedral Bandung</b><br>
      Ada kendala/kritik/saran?<br>
      Kontak: <b>Andar - WA</b>
      <a href="https://wa.me/6281221752365">0812 2175 2365</a>
    </footer>

    <script>
      const html5QrcodeScanner = new Html5Qrcode("reader");
      let scanCooldown = false;
      let SCRIPT_MAP = {}; 

      // Sound effect for success
      const beepSound = new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU'); // Short placeholder, replace with real sound URL if needed

      function playBeep() {
        // Simple beep using Web Audio API is better, but for simplicity:
        // beepSound.play().catch(e => console.log("Audio play blocked"));
      }

      async function loadScriptMap() {
        try {
          const res = await fetch("/config.json");
          SCRIPT_MAP = await res.json();
        } catch (e) {
          console.error("Failed to load script map", e);
          showStatus("⚠️ Gagal memuat konfigurasi kelas.", "error");
        }
      }

      async function loadTopikList() {
        const select = document.getElementById("week");
        // NOTE: I kept ClassCode=SAB. If this needs to be dynamic based on the QR,
        // you need to change the logic to load topics AFTER scanning, or have a class selector UI.
        try {
          const res = await fetch(`/api/absensi?action=topik&classCode=SAB`);
          const data = await res.json();

          select.innerHTML = "";
          
          if (data.status === "ok" && Array.isArray(data.topik)) {
             // Add a placeholder option
            const placeholder = document.createElement("option");
            placeholder.text = "-- Pilih Topik --";
            placeholder.value = "";
            placeholder.disabled = true;
            placeholder.selected = true;
            select.appendChild(placeholder);

            data.topik.forEach((item) => {
              const opt = document.createElement("option");
              opt.value = item.week;
              opt.textContent = `${item.week}. ${item.name}`;
              select.appendChild(opt);
            });
            
            // Select the last item automatically if appropriate, or leave placeholder
            if(data.topik.length > 0) {
               select.value = data.topik[data.topik.length - 1].week; // Auto-select latest week
            }
          } else {
            select.innerHTML = `<option disabled selected>Data topik tidak ditemukan</option>`;
          }
        } catch (err) {
          console.error("Gagal memuat topik:", err);
          select.innerHTML = `<option disabled selected>⚠️ Gagal memuat topik</option>`;
        }
      }

      function showStatus(text, type) {
        const el = document.getElementById("status");
        el.innerHTML = text;
        el.className = type;
      }

      function resetStatus() {
        const el = document.getElementById("status");
        el.className = "idle";
        el.innerHTML = "📷 Silakan pindai kode QR berikutnya";
      }

      async function handleScan(decodedText) {
        if (scanCooldown) return;

        // Validation: Ensure Topic is Selected
        const week = document.getElementById("week").value;
        if (!week) {
           showStatus("⚠️ Harap pilih topik terlebih dahulu!", "error");
           // Don't trigger cooldown for UI errors, let them retry immediately
           return;
        }

        scanCooldown = true;

        const parts = decodedText.split("/");
        const classCode = parts[1]?.toUpperCase(); // Safety check using ?.

        // Validate Class Code
        if (!classCode || !SCRIPT_MAP[classCode]) {
          showStatus(`❌ Kode kelas tidak valid dalam QR.<br>Terbaca: ${classCode || 'Tidak ada'}`, "error");
          setTimeout(() => { scanCooldown = false; resetStatus(); }, 3000);
          return;
        }

        showStatus("⏳ Menyimpan presensi...", "processing");

        try {
          const response = await fetch("/api/absensi", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ studentId: decodedText, week, classCode }),
          });

          // Handle non-JSON responses safely
          const text = await response.text();
          let res;
          try { res = JSON.parse(text); } catch { throw new Error("Invalid Server Response"); }

          if (res.status === "ok") {
            playBeep();
            showStatus(
              `✅ <b>${res.name}</b><br>Hadir: Topik ${week}<br><span class="student-id">${res.studentId.toUpperCase()}</span>`,
              "success"
            );
          } else if (res.status === "duplicate") {
            showStatus(`⚠️ ${res.message}`, "error"); // Yellow/Red for duplicate?
          } else {
            showStatus(`❌ ${res.message}`, "error");
          }

        } catch (error) {
          console.error(error);
          showStatus("⚠️ Koneksi Error / Gagal menghubungi server", "error");
        } finally {
          setTimeout(() => {
            scanCooldown = false;
            resetStatus();
          }, 4000); // Reduced from 5000 to 4000 for faster queues
        }
      }

      async function startScanner() {
        // Wait for config map before starting
        if (Object.keys(SCRIPT_MAP).length === 0) await loadScriptMap();
        
        html5QrcodeScanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 300, height: 300 } }, // Reduced box size slightly
          handleScan
        ).catch(err => {
            showStatus("❌ Gagal akses kamera. Izinkan akses kamera.", "error");
        });
      }

      window.onload = async () => {
        await Promise.all([loadScriptMap(), loadTopikList()]);
        startScanner();
      };
    </script>
    
    <script>window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };</script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
